<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../css/style.css">
    <title>Mis Pedidos - Food Store</title>
</head>
<body>
    <main class="main-container">
        <header class="header">
            <h1 class="header__title"><a href="../../store/home/home.html">FOOD STORE</a></h1>
            <button type="button" id="btn-menu-movil" class="header__menu-toggle" aria-label="Abrir menú" aria-expanded="false"><span></span><span></span><span></span></button>
            <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__item" id="username-nav-item"></li>
                    <li class="nav__item"><a href="../../store/home/home.html" class="nav__link">Volver al catalogo</a></li>
                    <li class="nav__item"><a href="#" class="nav__link nav__link--admin" id="logoutButton">Cerrar Sesion</a></li>
                </ul>
            </nav>
        </header>
        <hr class="separator">
        <section class="orders-section">
            <h2>Mis Pedidos</h2>
            <br>
            <div id="mensaje-vacio" class="cart-empty">
                <p class="mensaje-empty__carrito">Todavia no tenes pedidos.</p>
                <a href="../../store/home/home.html" class="nav__link--admin cart-empty__link">
                    Ver productos
                </a>
            </div>
            <div id="contenedor-pedidos" class="orders-list"></div>
        </section>
    </main>

    <div id="modal-detalle" class="modal-overlay modal-overlay--oculto">
        <div class="modal-checkout">
            <div class="modal-checkout__header">
                <h3 id="modal-detalle-titulo">Detalle del Pedido</h3>
                <button id="btn-cerrar-modal-detalle" class="modal-checkout__cerrar" type="button">X</button>
            </div>
            <div id="modal-detalle-contenido" class="modal-checkout__form"></div>
        </div>
    </div>

    <hr class="separator">

    <footer class="footer">
        <p class="footer__text">2026 Food Store. Todos los derechos reservados.</p>
        <p class="footer__text">Contacto: <a href="mailto:info@foodstore.com" class="footer__link">info@foodstore.com</a></p>
    </footer>
    
    <script type="module" src="./orders.ts"></script>
</body>
</html>
